<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDBussApp · Hi-Fi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; height: 100%; background: #EEF1F6; font-family: 'Manrope', system-ui, -apple-system, sans-serif; color: #0F2540; }
    #root { height: 100%; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="common.jsx"></script>
  <script type="text/babel" src="hifi-system.jsx"></script>
  <script type="text/babel" src="hifi-screens.jsx"></script>

  <script type="text/babel">
    const HF_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dark": false,
      "lang": "es",
      "accent": "#F59E0B"
    }/*EDITMODE-END*/;

    const HF_ACCENTS = ['#F59E0B', '#E76F51', '#2A9D8F', '#3B82F6'];

    function HiFiApp() {
      const [tweaks, setTweak] = useTweaks(HF_DEFAULTS);
      const t = HF_I18N[tweaks.lang] || HF_I18N.es;
      return (
        <>
          <DesignCanvas>
            {HF_APPROACHES.map(ap => (
              <DCSection key={ap.id} id={ap.id} title={ap.title} subtitle={ap.subtitle}>
                {ap.screens.map(s => (
                  <DCArtboard key={s.id} id={`${ap.id}-${s.id}`} label={s.label} width={340} height={720}>
                    <Phone width={340} height={720} dark={tweaks.dark} accent={tweaks.accent}>
                      <s.Comp t={t} dark={tweaks.dark} />
                    </Phone>
                  </DCArtboard>
                ))}
              </DCSection>
            ))}
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Idioma · Language">
              <TweakRadio
                value={tweaks.lang}
                onChange={v => setTweak('lang', v)}
                options={[{ value: 'es', label: 'Español' }, { value: 'en', label: 'English' }]}
              />
            </TweakSection>
            <TweakSection label="Apariencia">
              <TweakToggle label="Modo oscuro" value={tweaks.dark} onChange={v => setTweak('dark', v)} />
            </TweakSection>
            <TweakSection label="Color de marca">
              <TweakColor value={tweaks.accent} onChange={v => setTweak('accent', v)} options={HF_ACCENTS} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<HiFiApp />);
  </script>
</body>
</html>
